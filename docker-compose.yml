version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpt-to-doc
    ports:
      - "5000:5000"
    environment:
      - FLASK_DEBUG=false
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - LOG_LEVEL=INFO
      - FILE_CLEANUP_ENABLED=true
      - FILE_CLEANUP_INTERVAL=3600
      - FILE_MAX_AGE=3600
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./backend/outputs:/app/backend/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
